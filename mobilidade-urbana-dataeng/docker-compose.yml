version: "3.8"

# UrbanFlow — Ambiente de Desenvolvimento Local
# Uso: docker-compose up -d
# Acesso:
#   Airflow:  http://localhost:8080  (admin/admin)
#   MinIO:    http://localhost:9001  (minioadmin/minioadmin)
#   Superset: http://localhost:8088  (admin/admin)
#   Kafka UI: http://localhost:8090

networks:
  urbanflow:
    driver: bridge

volumes:
  minio_data:
  postgres_data:
  airflow_logs:

services:

  # ─────────────────────────────────────────────
  # KAFKA (KRaft mode — sem Zookeeper)
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: urbanflow-kafka
    networks: [urbanflow]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "urbanflow-cluster-001"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 10

  # Kafka UI (visualizar tópicos e mensagens)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: urbanflow-kafka-ui
    networks: [urbanflow]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: urbanflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]

  # ─────────────────────────────────────────────
  # MINIO (Object Storage — S3-compatível)
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: urbanflow-minio
    networks: [urbanflow]
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  # Cria os buckets automaticamente na inicialização
  minio-init:
    image: minio/mc:latest
    container_name: urbanflow-minio-init
    networks: [urbanflow]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb -p local/urbanflow-bronze &&
        mc mb -p local/urbanflow-silver &&
        mc mb -p local/urbanflow-gold &&
        echo 'Buckets criados com sucesso!'
      "

  # ─────────────────────────────────────────────
  # POSTGRESQL (metadados Airflow + banco legado simulado)
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: urbanflow-postgres
    networks: [urbanflow]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: urbanflow
      POSTGRES_PASSWORD: urbanflow123
      POSTGRES_DB: urbanflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanflow"]
      interval: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # APACHE AIRFLOW
  # ─────────────────────────────────────────────
  airflow:
    image: apache/airflow:2.9.0
    container_name: urbanflow-airflow
    networks: [urbanflow]
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://urbanflow:urbanflow123@postgres/urbanflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: urbanflow-secret-key-2026
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@urbanflow.com &&
        airflow webserver & airflow scheduler
      "
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # APACHE SUPERSET (BI / Dashboards)
  # ─────────────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: urbanflow-superset
    networks: [urbanflow]
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: urbanflow-superset-secret
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@urbanflow.com --password admin &&
        superset init &&
        superset run -p 8088 --with-threads --reload --debugger
      "
    depends_on: [postgres]
